kind = "web"
previewPath = "/"
title = "MockTestPro"
version = "1.0.0"
id = "artifacts/mocktestpro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21348

[services.development]
run = "pnpm --filter @workspace/mocktestpro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mocktestpro", "run", "build" ]
publicDir = "artifacts/mocktestpro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21348"
BASE_PATH = "/"
