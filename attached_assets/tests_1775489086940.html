<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests | MockTestPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
  
  <nav class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
    <div class="mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="flex items-center gap-2 font-bold text-xl">
          <span class="material-icons">quiz</span>
          <span class="hidden sm:inline">MockTestPro</span>
        </a>
        <div class="flex items-center gap-4">
          <a href="dashboard.html" class="text-slate-700 hover:text-blue-600">Dashboard</a>
          <button id="logout-btn" class="px-4 py-2 bg-red-600 text-white rounded-lg">Logout</button>
        </div>
      </div>
    </div>
  </nav>
  
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold mb-8">Available Tests</h1>
    
    <div id="tests-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <h3 class="text-lg font-bold">JEE Main Mock 1</h3>
        <p class="text-xs text-slate-500 mt-1"><span class="px-2 py-1 bg-blue-100 text-blue-700 rounded mr-2">JEE</span></p>
        <div class="text-sm text-slate-600 mt-4 space-y-1">
          <p>180 minutes | 90 questions</p>
          <p>5,421 attempts | Avg: 72.5%</p>
        </div>
        <button onclick="window.location.href='test.html?id=1'" class="w-full mt-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Start Test</button>
      </div>
      
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <h3 class="text-lg font-bold">NEET Mock 1</h3>
        <p class="text-xs text-slate-500 mt-1"><span class="px-2 py-1 bg-green-100 text-green-700 rounded mr-2">NEET</span></p>
        <div class="text-sm text-slate-600 mt-4 space-y-1">
          <p>180 minutes | 180 questions</p>
          <p>4,100 attempts | Avg: 75.3%</p>
        </div>
        <button onclick="window.location.href='test.html?id=2'" class="w-full mt-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Start Test</button>
      </div>
      
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <h3 class="text-lg font-bold">CAT Mock 1</h3>
        <p class="text-xs text-slate-500 mt-1"><span class="px-2 py-1 bg-purple-100 text-purple-700 rounded mr-2">CAT</span></p>
        <div class="text-sm text-slate-600 mt-4 space-y-1">
          <p>120 minutes | 100 questions</p>
          <p>1,500 attempts | Avg: 65.2%</p>
        </div>
        <button onclick="window.location.href='test.html?id=3'" class="w-full mt-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Start Test</button>
      </div>
    </div>
  </main>

  <script>
    const Storage = {
      get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
      clear: () => localStorage.clear(),
    };

    if (!Storage.get("user")) window.location.href = "index.html";

    document.getElementById("logout-btn").addEventListener("click", () => {
      Storage.clear();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
