<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
<h2>Login</h2>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCar09eV3t6KwFKwDwkKKe8auXIHmBz5Ek",
  authDomain: "sarbedutech.firebaseapp.com",
  projectId: "sarbedutech",
  storageBucket: "sarbedutech.appspot.app",
  messagingSenderId: "1083299267005",
  appId: "1:1083299267005:web:5f7f4374509edf703ad2d4",
  measurementId: "G-YE0T8G8CQF"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.login = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  signInWithEmailAndPassword(auth, email, password).then(()=> window.location = "index.html").catch(e=>alert(e.message));
};

window.signup = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  createUserWithEmailAndPassword(auth, email, password).then(()=>alert("Signup done")).catch(e=>alert(e.message));
};
</script>
</body>
</html>
