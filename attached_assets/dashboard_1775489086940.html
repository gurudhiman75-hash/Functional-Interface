<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | MockTestPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
  
  <nav class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
    <div class="mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="flex items-center gap-2 font-bold text-xl">
          <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-violet-600 rounded-lg flex items-center justify-center text-white">
            <span class="material-icons text-sm">quiz</span>
          </div>
          <span class="hidden sm:inline">MockTestPro</span>
        </a>
        <div class="flex items-center gap-4">
          <a href="leaderboard.html" class="hidden md:inline text-slate-700 hover:text-blue-600 font-medium">Leaderboard</a>
          <button id="logout-btn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Logout</button>
        </div>
      </div>
    </div>
  </nav>
  
  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
      <div>
        <h1 class="text-4xl font-bold text-slate-900">Dashboard</h1>
        <p class="text-slate-600">Welcome back! Here's your overview.</p>
      </div>
      <a href="tests.html" class="px-6 py-3 bg-blue-600 text-white rounded-full font-bold hover:bg-blue-700">Start New Test</a>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <p class="text-slate-600 text-sm">Tests Taken</p>
        <p class="text-3xl font-bold mt-2">12</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <p class="text-slate-600 text-sm">Avg. Score</p>
        <p class="text-3xl font-bold mt-2">72.5%</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <p class="text-slate-600 text-sm">Rank</p>
        <p class="text-3xl font-bold mt-2">#1250</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <p class="text-slate-600 text-sm">Accuracy</p>
        <p class="text-3xl font-bold mt-2">82.3%</p>
      </div>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <div class="lg:col-span-2 bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <h3 class="text-lg font-bold mb-4">Performance Trend</h3>
        <canvas id="performance-chart"></canvas>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <h3 class="text-lg font-bold mb-4">Accuracy</h3>
        <canvas id="accuracy-chart"></canvas>
      </div>
    </div>
    
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
      <h3 class="text-lg font-bold mb-4">Recent Attempts</h3>
      <div class="space-y-4">
        <div class="flex justify-between p-4 bg-slate-50 rounded-lg">
          <div>
            <p class="font-semibold">JEE Main Mock 1</p>
            <p class="text-sm text-slate-600">2026-04-05</p>
          </div>
          <div class="text-right">
            <p class="text-lg font-bold text-emerald-600">75%</p>
            <a href="result.html" class="text-sm text-blue-600">View Details</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const Storage = {
      get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
      clear: () => localStorage.clear(),
    };

    if (!Storage.get("user")) window.location.href = "index.html";

    document.getElementById("logout-btn").addEventListener("click", () => {
      Storage.clear();
      window.location.href = "index.html";
    });

    // Performance Chart
    const perfCtx = document.getElementById("performance-chart").getContext("2d");
    new Chart(perfCtx, {
      type: "line",
      data: {
        labels: ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5", "Day 6", "Day 7"],
        datasets: [{
          label: "Score",
          data: [65, 68, 71, 75, 78, 72, 79],
          borderColor: "#2563eb",
          backgroundColor: "rgba(37, 99, 235, 0.1)",
          tension: 0.4,
          fill: true,
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { max: 100 } } }
    });

    // Accuracy Chart
    const accCtx = document.getElementById("accuracy-chart").getContext("2d");
    new Chart(accCtx, {
      type: "doughnut",
      data: {
        labels: ["Correct", "Wrong", "Unanswered"],
        datasets: [{ data: [128, 20, 12], backgroundColor: ["#10b981", "#ef4444", "#94a3b8"] }]
      },
      options: { responsive: true }
    });
  </script>
</body>
</html>
