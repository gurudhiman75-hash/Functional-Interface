<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | MockTestPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
  
  <nav class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
    <div class="mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="flex items-center gap-2 font-bold text-xl">
          <span class="material-icons">quiz</span>
          <span class="hidden sm:inline">MockTestPro</span>
        </a>
        <div class="flex items-center gap-4">
          <a href="dashboard.html" class="text-slate-700 hover:text-blue-600">Dashboard</a>
          <a href="tests.html" class="text-slate-700 hover:text-blue-600">Tests</a>
        </div>
      </div>
    </div>
  </nav>
  
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold mb-8">Leaderboard</h1>
    
    <div class="bg-gradient-to-r from-blue-600 to-violet-600 rounded-xl p-8 text-white mb-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="text-center">
          <p class="text-blue-100 mb-2">Your Rank</p>
          <p class="text-5xl font-bold">#1250</p>
        </div>
        <div class="text-center md:border-l md:border-r md:border-white/30">
          <p class="text-blue-100 mb-2">Your Score</p>
          <p class="text-5xl font-bold">85.50</p>
        </div>
        <div class="text-center">
          <p class="text-blue-100 mb-2">Percentile</p>
          <p class="text-5xl font-bold">92.5%</p>
        </div>
      </div>
    </div>
    
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <table class="w-full">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="px-6 py-4 text-left text-sm font-semibold">Rank</th>
            <th class="px-6 py-4 text-left text-sm font-semibold">User</th>
            <th class="px-6 py-4 text-left text-sm font-semibold">Score</th>
            <th class="px-6 py-4 text-left text-sm font-semibold">Accuracy</th>
            <th class="px-6 py-4 text-left text-sm font-semibold">Tests</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-200">
          <tr class="hover:bg-slate-50">
            <td class="px-6 py-4"><span class="font-bold">🥇 #1</span></td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=1" class="w-10 h-10 rounded-full">
                <div>
                  <p class="font-semibold">Raj Kumar</p>
                  <p class="text-xs text-slate-500">Delhi</p>
                </div>
              </div>
            </td>
            <td class="px-6 py-4"><span class="font-bold">98.5</span></td>
            <td class="px-6 py-4">96.2%</td>
            <td class="px-6 py-4"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">45</span></td>
          </tr>
          <tr class="hover:bg-slate-50">
            <td class="px-6 py-4"><span class="font-bold">🥈 #2</span></td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=2" class="w-10 h-10 rounded-full">
                <div>
                  <p class="font-semibold">Priya Sharma</p>
                  <p class="text-xs text-slate-500">Mumbai</p>
                </div>
              </div>
            </td>
            <td class="px-6 py-4"><span class="font-bold">96.2</span></td>
            <td class="px-6 py-4">94.1%</td>
            <td class="px-6 py-4"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">42</span></td>
          </tr>
          <tr class="hover:bg-slate-50">
            <td class="px-6 py-4"><span class="font-bold">🥉 #3</span></td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=3" class="w-10 h-10 rounded-full">
                <div>
                  <p class="font-semibold">Amit Singh</p>
                  <p class="text-xs text-slate-500">Bangalore</p>
                </div>
              </div>
            </td>
            <td class="px-6 py-4"><span class="font-bold">94.8</span></td>
            <td class="px-6 py-4">92.5%</td>
            <td class="px-6 py-4"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">40</span></td>
          </tr>
          <tr class="bg-blue-50 border-l-4 border-l-blue-600">
            <td class="px-6 py-4"><span class="font-bold">#1250</span></td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=you" class="w-10 h-10 rounded-full">
                <div>
                  <p class="font-semibold">You</p>
                  <p class="text-xs text-slate-500">Your City</p>
                </div>
              </div>
            </td>
            <td class="px-6 py-4"><span class="font-bold">85.5</span></td>
            <td class="px-6 py-4">82.3%</td>
            <td class="px-6 py-4"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">12</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
