<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Exam | MockTestPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
  
  <nav class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
    <div class="mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="flex items-center gap-2 font-bold text-xl">
          <span class="material-icons">quiz</span>
          <span class="hidden sm:inline">MockTestPro</span>
        </a>
      </div>
    </div>
  </nav>
  
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 id="page-title" class="text-4xl font-bold mb-8">Select Exam</h1>
    
    <div id="exams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 cursor-pointer hover:shadow-lg" onclick="window.location.href='tests.html'">
        <h3 class="text-3xl mb-3">📚</h3>
        <h3 class="text-lg font-bold">JEE Main 2024</h3>
        <div class="text-sm text-slate-600 mt-4 space-y-1">
          <p>50 Tests Available</p>
          <p>Avg Score: 72.5%</p>
        </div>
        <button class="w-full mt-4 py-2 bg-blue-600 text-white rounded-lg">View Tests</button>
      </div>
      
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 cursor-pointer hover:shadow-lg" onclick="window.location.href='tests.html'">
        <h3 class="text-3xl mb-3">📚</h3>
        <h3 class="text-lg font-bold">JEE Main 2023</h3>
        <div class="text-sm text-slate-600 mt-4 space-y-1">
          <p>45 Tests Available</p>
          <p>Avg Score: 70.2%</p>
        </div>
        <button class="w-full mt-4 py-2 bg-blue-600 text-white rounded-lg">View Tests</button>
      </div>
      
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 cursor-pointer hover:shadow-lg" onclick="window.location.href='tests.html'">
        <h3 class="text-3xl mb-3">🧬</h3>
        <h3 class="text-lg font-bold">NEET 2024</h3>
        <div class="text-sm text-slate-600 mt-4 space-y-1">
          <p>60 Tests Available</p>
          <p>Avg Score: 75.3%</p>
        </div>
        <button class="w-full mt-4 py-2 bg-blue-600 text-white rounded-lg">View Tests</button>
      </div>
    </div>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const categoryId = urlParams.get("id");
    const categories = { 1: "JEE Main", 2: "NEET", 3: "CAT" };
    document.getElementById("page-title").textContent = (categories[categoryId] || "Exams") + " - Select Exam";
  </script>
</body>
</html>
