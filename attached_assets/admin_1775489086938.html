<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | MockTestPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
  
  <nav class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
    <div class="mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="flex items-center gap-2 font-bold text-xl">
          <span class="material-icons">quiz</span>
          <span class="hidden sm:inline">MockTestPro</span>
        </a>
        <button id="logout-btn" class="px-4 py-2 bg-red-600 text-white rounded-lg">Logout</button>
      </div>
    </div>
  </nav>
  
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold mb-8">Admin Dashboard</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <p class="text-slate-600">Total Users</p>
        <p class="text-3xl font-bold mt-2">12,450</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <p class="text-slate-600">Total Tests</p>
        <p class="text-3xl font-bold mt-2">542</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <p class="text-slate-600">Total Questions</p>
        <p class="text-3xl font-bold mt-2">28,950</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
        <p class="text-slate-600">Test Attempts</p>
        <p class="text-3xl font-bold mt-2">156,320</p>
      </div>
    </div>
    
    <div class="flex gap-4 mb-8 border-b border-slate-200">
      <button class="admin-tab px-4 py-3 border-b-2 border-blue-600 text-blue-600 font-semibold" data-tab="categories">Categories</button>
      <button class="admin-tab px-4 py-3 border-b-2 border-transparent text-slate-600" data-tab="tests">Tests</button>
    </div>
    
    <div id="categories-tab" class="admin-content bg-white rounded-xl p-6 shadow-sm border border-slate-200">
      <h3 class="text-lg font-bold mb-4">Add New Category</h3>
      <form class="space-y-3 mb-6">
        <input type="text" placeholder="Category Name" class="w-full px-4 py-2 border border-slate-300 rounded-lg">
        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg">Add Category</button>
      </form>
      
      <h3 class="text-lg font-bold mb-4">Categories List</h3>
      <table class="w-full text-left">
        <thead class="border-b">
          <tr>
            <th class="pb-3">Name</th>
            <th class="pb-3">Tests</th>
            <th class="pb-3">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-b hover:bg-slate-50">
            <td class="py-3">JEE Main</td>
            <td class="py-3">50</td>
            <td class="py-3 text-sm"><a href="#" class="text-blue-600 mr-3">Edit</a><a href="#" class="text-red-600">Delete</a></td>
          </tr>
          <tr class="border-b hover:bg-slate-50">
            <td class="py-3">NEET</td>
            <td class="py-3">45</td>
            <td class="py-3 text-sm"><a href="#" class="text-blue-600 mr-3">Edit</a><a href="#" class="text-red-600">Delete</a></td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <div id="tests-tab" class="admin-content hidden bg-white rounded-xl p-6 shadow-sm border border-slate-200">
      <h3 class="text-lg font-bold mb-4">Create Test</h3>
      <form class="space-y-3">
        <input type="text" placeholder="Test Name" class="w-full px-4 py-2 border border-slate-300 rounded-lg">
        <select class="w-full px-4 py-2 border border-slate-300 rounded-lg">
          <option>Select Category</option>
          <option>JEE Main</option>
          <option>NEET</option>
        </select>
        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg">Create Test</button>
      </form>
    </div>
  </main>

  <script>
    document.querySelectorAll(".admin-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".admin-content").forEach(c => c.classList.add("hidden"));
        document.getElementById(tab.dataset.tab + "-tab").classList.remove("hidden");
        document.querySelectorAll(".admin-tab").forEach(t => t.classList.remove("border-b-2", "border-blue-600", "text-blue-600"));
        tab.classList.add("border-b-2", "border-blue-600", "text-blue-600");
      });
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
