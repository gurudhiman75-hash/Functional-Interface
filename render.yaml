services:
  - type: web
    name: examtree-api
    runtime: node
    rootDir: .
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.33.0 --activate &&
      pnpm install --no-frozen-lockfile --prod=false &&
      pnpm --filter @workspace/api-server build
    startCommand: NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically — no need to set it here

      # ── Database ──────────────────────────────────────────────────────────
      # Neon PostgreSQL connection string
      # Example: postgresql://user:pass@ep-xxx.us-east-1.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false   # set in Render dashboard

      # ── Firebase Auth ─────────────────────────────────────────────────────
      # Paste the entire service account JSON as a single-line string.
      # Generate from: Firebase Console → Project Settings → Service Accounts
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false   # set in Render dashboard

      # ── CORS ──────────────────────────────────────────────────────────────
      # Comma-separated list of allowed frontend origins (no trailing slash).
      # Example: https://yourapp.web.app,https://www.yourapp.com
      - key: CORS_ORIGINS
        sync: false   # set in Render dashboard

      # ── Razorpay (optional — omit if not using payments) ─────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: INR
      - key: ALLOW_MOCK_PAYMENTS
        value: "false"

      # ── Upstash Redis (optional — caching/rate-limiting) ──────────────────
      # Without these, the server degrades gracefully (no caching, no rate limits).
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  # ── Frontend static site ───────────────────────────────────────────────────
  - type: web
    name: examtree-new
    runtime: static
    rootDir: .
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.33.0 --activate &&
      pnpm install --no-frozen-lockfile --prod=false &&
      pnpm --filter examtree build
    staticPublishPath: ./artifacts/examtree/dist/public
    # SPA: serve index.html for every path that doesn't match a static file
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Must point at your deployed API service URL (no trailing slash).
      # Replace with the actual URL shown in your Render API service dashboard.
      # Example: https://examtree-api.onrender.com/api
      - key: VITE_API_BASE_URL
        sync: false   # set in Render dashboard: https://examtree-api.onrender.com/api
