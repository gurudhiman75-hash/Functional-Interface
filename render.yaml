services:
  - type: web
    name: examtree-api
    runtime: node
    rootDir: .
    buildCommand: bash build-api.sh && node artifacts/api-server/dist/migrate.mjs
    startCommand: NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically — no need to set it here

      # ── Database ──────────────────────────────────────────────────────────
      # Neon PostgreSQL connection string
      # Example: postgresql://user:pass@ep-xxx.us-east-1.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false   # set in Render dashboard

      # ── Firebase Auth (server) ────────────────────────────────────────────
      # Paste the entire service account JSON as a single-line string.
      # Generate from: Firebase Console → Project Settings → Service Accounts
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false   # set in Render dashboard

      # ── Firebase (client — baked into Vite build) ─────────────────────────
      # Get from: Firebase Console → Project Settings → Your apps → SDK setup
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────
      # Comma-separated list of allowed frontend origins (no trailing slash).
      # Example: https://yourapp.web.app,https://www.yourapp.com
      - key: CORS_ORIGINS
        sync: false   # set in Render dashboard

      # ── Razorpay (optional — omit if not using payments) ─────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: INR
      - key: ALLOW_MOCK_PAYMENTS
        value: "false"

      # ── Upstash Redis (optional — caching/rate-limiting) ──────────────────
      # Without these, the server degrades gracefully (no caching, no rate limits).
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
